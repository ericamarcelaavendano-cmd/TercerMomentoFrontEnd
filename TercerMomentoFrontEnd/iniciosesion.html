<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gestión Académica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="brand">INSTITUCIÓN EDUCATIVA</div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="historia.html">Historia</a>
            <a href="programas.html">Programas</a>
            <a href="infraestructura.html">Infraestructura</a>
        </nav>
        <a href="iniciosesion.html" class="btn-login-nav">Log in</a>
    </header>

    <main class="login-wrapper">
        <div class="form-container">
            <div class="card-header">
                
                    <path d="M5 35 L20 5 L25 15 L15 35Z" fill="white" opacity="0.9"/>
                    <path d="M18 35 L30 8 L35 18 L27 35Z" fill="white" opacity="0.7"/>
                    <path d="M30 35 L40 12 L45 22 L38 35Z" fill="white" opacity="0.5"/>
                </svg>
                <span class="card-title">INSTITUCIÓN EDUCATIVA</span>
            </div>
            <div class="card-body">
                <div class="input-block">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="email" placeholder="Usuario">
                </div>
                <div class="input-block">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="Contraseña">
                </div>
                <button id="btn-login" class="btn-acceder">Acceder</button>
                <div id="mensaje-estado" class="status-msg"></div>
                <div class="card-footer-links">
                    <button class="link-btn">Soporte</button>
                    <button class="link-btn">Olvidé mi contraseña</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>2026 | Elaborado por Equipo Integrador</p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
